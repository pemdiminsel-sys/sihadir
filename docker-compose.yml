version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sihadir-db
    restart: always
    environment:
      POSTGRES_USER: sihadir_user
      POSTGRES_PASSWORD: sihadir_password
      POSTGRES_DB: sihadir_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: sihadir-redis
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: sihadir-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
